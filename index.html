<!doctype html>
<html>
    <head>
        <title>STI book</title>
        <link rel="stylesheet" href="/styles.css">
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE-edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="client.js" defer></script>
        <link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    </head>

    <body>
        <div class="book-wrapper">

  <button id="prev-btn">
    <i class="fas fa-arrow-circle-left"></i>
  </button>

  <div id="book" class="book">

    <div class="page-scene">
      <img id="page-image" alt="Book illustration">

      <div id="cover-overlay" class="cover-overlay">
        <div>
          <h1 id="cover-title"></h1>
          <h2 id="cover-subtitle"></h2>
        </div>
        <p id="cover-text"></p>
      </div>
    </div>

    <div id="story-box" class="story-box">
      <h1 id="page-title"></h1>
      <h2 id="page-subtitle"></h2>
      <p id="page-text"></p>
    </div>

    <div id="dialog-box" class="dialog-box">
      <h3 id="speaker"></h3>
      <p id="dialog-text"></p>
    </div>

  </div>

  <button id="next-btn">
    <i class="fas fa-arrow-circle-right"></i>
  </button>

</div>
            </body>
</html>
